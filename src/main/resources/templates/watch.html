<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch — Host MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">Host MVP</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/dashboard">Browse</a>
                <a href="/premium">Premium</a>
                <div class="nav-auth" id="navAuth">
                    <a href="/auth/login" class="btn btn-outline">Sign In</a>
                    <a href="/auth/register" class="btn btn-primary">Get Started</a>
                </div>
                <div class="nav-user" id="navUser" style="display:none">
                    <a href="/upload" class="btn btn-outline">Upload</a>
                    <span id="userName"></span>
                    <button onclick="logout()" class="btn btn-outline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="watch-page">
        <div class="watch-container" id="watchContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading video...
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const videoId = window.location.pathname.split('/').pop();
        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            loadVideo(videoId);
        });
    </script>
</body>
</html>
