<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - StreamVid</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">StreamVid</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/dashboard">Browse</a>
                <a href="/premium">Premium</a>
                <div class="nav-user">
                    <span id="userName"></span>
                    <button onclick="logout()" class="btn btn-outline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="upload-container">
            <h1>Upload Video</h1>
            <div class="upload-card">
                <form id="uploadForm" onsubmit="handleUpload(event)">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="file">Video File (max 2GB)</label>
                        <input type="file" id="file" name="file" accept="video/*" required>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="premium" name="premium">
                            Premium content (subscribers only)
                        </label>
                    </div>
                    <div class="upload-progress" id="uploadProgress" style="display:none">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <p id="progressText">Uploading...</p>
                    </div>
                    <div class="form-error" id="uploadError"></div>
                    <button type="submit" class="btn btn-primary btn-block">Upload</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
