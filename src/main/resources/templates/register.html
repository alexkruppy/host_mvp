<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Host MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="/" class="auth-logo">Host MVP</a>
            <h1>Create account</h1>
            <p>Start streaming in minutes</p>
        </div>
        <div class="auth-card">
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input class="form-input" type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="At least 6 characters" minlength="6" required>
                </div>
                <div class="form-error" id="registerError" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
            </form>
            <div class="auth-divider"><span>Already registered?</span></div>
            <div class="auth-footer">
                Already have an account? <a href="/auth/login">Sign in</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="/js/app.js"></script>
</body>
</html>
