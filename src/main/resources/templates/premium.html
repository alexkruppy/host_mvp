<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium — Host MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">Host MVP</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/dashboard">Browse</a>
                <a href="/premium">Premium</a>
                <div class="nav-auth" id="navAuth">
                    <a href="/auth/login" class="btn btn-outline">Sign In</a>
                    <a href="/auth/register" class="btn btn-primary">Get Started</a>
                </div>
                <div class="nav-user" id="navUser" style="display:none">
                    <a href="/upload" class="btn btn-outline">Upload</a>
                    <span id="userName"></span>
                    <button onclick="logout()" class="btn btn-outline">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="premium-page">
        <div class="premium-container">
            <div class="premium-icon">💎</div>
            <h1>Go Premium</h1>
            <p class="premium-subtitle">Unlock unlimited access to all premium content</p>
            <div class="premium-card">
                <div class="premium-price">
                    <span class="price">$9.99</span>
                    <span class="period">/ month</span>
                </div>
                <ul class="premium-features">
                    <li>Access all premium videos</li>
                    <li>Ad-free experience</li>
                    <li>HD & 4K streaming</li>
                    <li>Cancel anytime</li>
                </ul>
                <button onclick="createCheckoutSession()" class="btn btn-premium btn-lg btn-block" id="subscribeBtn">
                    Subscribe Now
                </button>
                <p class="premium-note" id="loginNote" style="display:none">
                    <a href="/auth/login">Sign in</a> to subscribe
                </p>
                <p class="premium-note" id="alreadyPremium" style="display:none">
                    ✨ You're already a Premium member
                </p>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            const token = getToken();
            const user = getUser();
            if (!token) {
                document.getElementById('subscribeBtn').style.display = 'none';
                document.getElementById('loginNote').style.display = 'block';
            } else if (user && user.premiumActive) {
                document.getElementById('subscribeBtn').style.display = 'none';
                document.getElementById('alreadyPremium').style.display = 'block';
            }
        });
    </script>
</body>
</html>
