<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск людей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Поиск людей</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по имени, фамилии, email или телефону..." autofocus>
            <button id="searchBtn">Найти</button>
            <button id="clearBtn">Сбросить</button>
        </div>

        <div class="form-box">
            <h2>Добавить / Редактировать</h2>
            <form id="personForm">
                <input type="hidden" id="personId">
                <div class="form-row">
                    <input type="text" id="firstName" placeholder="Имя" required>
                    <input type="text" id="lastName" placeholder="Фамилия" required>
                </div>
                <div class="form-row">
                    <input type="email" id="email" placeholder="Email">
                    <input type="text" id="phoneNumber" placeholder="Телефон">
                </div>
                <div class="form-actions">
                    <button type="submit" id="saveBtn">Сохранить</button>
                    <button type="button" id="cancelBtn" style="display:none">Отмена</button>
                </div>
            </form>
        </div>

        <div class="results-box">
            <h2>Результаты (<span id="resultCount">0</span>)</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Фамилия</th>
                        <th>Email</th>
                        <th>Телефон</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
            <p id="emptyMessage" class="empty">Люди не найдены</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
