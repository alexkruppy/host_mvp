services:
  postgres:
    image: postgres:16
    container_name: host_mvp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: host_mvp
      POSTGRES_USER: hostmvp
      POSTGRES_PASSWORD: hostmvp_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hostmvp -d host_mvp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: host_mvp_app
    restart: unless-stopped
    ports:
      - "192.168.1.69:8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/host_mvp
      SPRING_DATASOURCE_USERNAME: hostmvp
      SPRING_DATASOURCE_PASSWORD: hostmvp_pass
      APP_BASE_URL: http://192.168.1.69:8081
    volumes:
      - uploads:/app/uploads
      - hls:/app/hls
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  hls:
